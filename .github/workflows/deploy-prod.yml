name: Deploy to Production Server (Mac Mini)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/wilo:prod-latest \
            -t ${{ secrets.DOCKER_USERNAME }}/wilo:prod-${{ github.sha }} \
            .
          docker push ${{ secrets.DOCKER_USERNAME }}/wilo:prod-latest
          docker push ${{ secrets.DOCKER_USERNAME }}/wilo:prod-${{ github.sha }}

  deploy-prod:
    runs-on: self-hosted
    needs: build-and-push-prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env.prod << EOF_ENV
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXP=${{ secrets.JWT_ACCESS_EXP }}
          JWT_REFRESH_EXP=${{ secrets.JWT_REFRESH_EXP }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          CLOUD_AWS_S3_BUCKET=${{ secrets.CLOUD_AWS_S3_BUCKET }}
          CLOUD_AWS_CREDENTIALS_ACCESS_KEY=${{ secrets.CLOUD_AWS_CREDENTIALS_ACCESS_KEY }}
          CLOUD_AWS_CREDENTIALS_SECRET_KEY=${{ secrets.CLOUD_AWS_CREDENTIALS_SECRET_KEY }}
          AI_BASE_URL=${{ secrets.AI_BASE_URL }}
          SPRING_CRYPTO_SECRET_KEY=${{ secrets.CRYPTO_SECRET_KEY }}
          NCP_ACCESS_KEY=${{ secrets.NCP_ACCESS_KEY }}
          NCP_SECRET_KEY=${{ secrets.NCP_SECRET_KEY }}
          NCP_SENDER_PHONE=${{ secrets.NCP_SENDER_PHONE }}
          NCP_SERVICE_ID=${{ secrets.NCP_SERVICE_ID }}
          APPLE_CLIENT_ID=${{ secrets.APPLE_CLIENT_ID }}
          APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID=${{ secrets.APPLE_KEY_ID }}
          APPLE_PRIVATE_KEY=${{ secrets.APPLE_PRIVATE_KEY }}
          EOF_ENV
        shell: bash

      - name: Validate required env
        run: |
          for key in DOCKER_USERNAME MYSQL_ROOT_PASSWORD AI_BASE_URL SENTRY_DSN JWT_SECRET JWT_ACCESS_EXP JWT_REFRESH_EXP SPRING_CRYPTO_SECRET_KEY CLOUD_AWS_S3_BUCKET CLOUD_AWS_CREDENTIALS_ACCESS_KEY CLOUD_AWS_CREDENTIALS_SECRET_KEY NCP_ACCESS_KEY NCP_SECRET_KEY NCP_SENDER_PHONE NCP_SERVICE_ID; do
            if ! grep -q "^${key}=.\\+" .env.prod; then
              echo "ERROR: Missing required ${key} in .env.prod"
              exit 1
            fi
          done
          echo "env validation passed."
        shell: bash

      - name: Blue-Green Deployment
        run: |
          docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d mysql-prod redis-prod

          echo "Cleaning up orphan containers..."
          docker stop wilo-app-prod 2>/dev/null || true
          docker rm wilo-app-prod 2>/dev/null || true
          docker stop wilo-app 2>/dev/null || true
          docker rm wilo-app 2>/dev/null || true

          BLUE_RUNNING=$(docker ps --filter "name=wilo-app-prod-blue" --filter "status=running" -q)
          GREEN_RUNNING=$(docker ps --filter "name=wilo-app-prod-green" --filter "status=running" -q)

          if [ -n "$BLUE_RUNNING" ]; then
            CURRENT="blue"
            TARGET="green"
            CURRENT_PORT=8090
            TARGET_PORT=8091
          elif [ -n "$GREEN_RUNNING" ]; then
            CURRENT="green"
            TARGET="blue"
            CURRENT_PORT=8091
            TARGET_PORT=8090
          else
            CURRENT="none"
            TARGET="blue"
            CURRENT_PORT=0
            TARGET_PORT=8090
          fi

          echo "Current active environment: $CURRENT (port $CURRENT_PORT)"
          echo "Deploying to target environment: $TARGET (port $TARGET_PORT)"

          if [ "$TARGET" = "green" ]; then
            docker-compose -f docker-compose.prod.yml --env-file .env.prod --profile green pull app-prod-green
            docker-compose -f docker-compose.prod.yml --env-file .env.prod --profile green up -d app-prod-green
          else
            docker-compose -f docker-compose.prod.yml --env-file .env.prod pull app-prod-blue
            docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d app-prod-blue
          fi

          echo "Waiting for $TARGET environment to be healthy..."
          timeout=120
          elapsed=0
          healthy=false

          while [ $elapsed -lt $timeout ]; do
            HEALTH_STATUS=$(docker inspect --format='{{.State.Health.Status}}' wilo-app-prod-$TARGET 2>/dev/null || echo "none")
            if [ "$HEALTH_STATUS" = "healthy" ]; then
              echo "$TARGET environment is healthy!"
              healthy=true
              break
            fi
            echo "Waiting... ($elapsed seconds) - Current status: $HEALTH_STATUS"
            sleep 5
            elapsed=$((elapsed + 5))
          done

          if [ "$healthy" = false ]; then
            echo "ERROR: $TARGET environment failed to become healthy within $timeout seconds"
            docker-compose -f docker-compose.prod.yml --env-file .env.prod logs --tail=100 app-prod-$TARGET
            exit 1
          fi

          echo "Switching Nginx to $TARGET environment (port $TARGET_PORT)..."
          sudo /opt/wilo/scripts/switch-nginx.sh $TARGET_PORT

          if sudo /opt/homebrew/bin/nginx -t; then
            sudo /opt/homebrew/bin/nginx -s reload
            echo "Nginx successfully switched to $TARGET environment"
          else
            echo "ERROR: Nginx configuration test failed"
            sudo /opt/wilo/scripts/switch-nginx.sh $CURRENT_PORT
            exit 1
          fi

          echo "Waiting 10 seconds before stopping old environment..."
          sleep 10

          if [ "$CURRENT" != "none" ]; then
            echo "Stopping old $CURRENT environment..."
            docker-compose -f docker-compose.prod.yml --env-file .env.prod stop app-prod-$CURRENT || true
            docker-compose -f docker-compose.prod.yml --env-file .env.prod rm -f app-prod-$CURRENT || true
          else
            echo "Initial deployment - no old environment to stop"
          fi

          echo "=== Current Container Status ==="
          docker-compose -f docker-compose.prod.yml --env-file .env.prod ps

          echo "=== $TARGET Environment Logs ==="
          docker-compose -f docker-compose.prod.yml --env-file .env.prod logs --tail=50 app-prod-$TARGET
        shell: bash

      - name: Clean up old Docker images
        run: docker image prune -f --filter "until=24h"
        shell: bash
        continue-on-error: true
