services:
  # MySQL Database - PRODUCTION
  mysql-prod:
    image: mysql:8.0
    container_name: wilo-mysql-prod
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 1g
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: wilo_db_prod
      TZ: Asia/Seoul
    ports:
      - "3310:3306" # 다른 서비스의 3308/3309와 충돌하지 않도록 분리
    volumes:
      - mysql_prod_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
      - --max-connections=60
    networks:
      - wilo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Redis Cache - PRODUCTION
  redis-prod:
    image: redis:7.2-alpine
    container_name: wilo-redis-prod
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 640m
    ports:
      - "6391:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - wilo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  # Spring Boot Application - PRODUCTION (Blue)
  app-prod-blue:
    image: ${DOCKER_USERNAME}/wilo:prod-latest
    container_name: wilo-app-prod-blue
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 768m
    ports:
      - "8090:8080"  # Blue 포트 (외부 8090 -> 컨테이너 내부 8080)
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -XX:+ExitOnOutOfMemoryError"
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-prod:3306/wilo_db_prod?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis-prod
      SPRING_DATA_REDIS_PORT: 6379
      AI_BASE_URL: ${AI_BASE_URL}
      SPRING_CRYPTO_SECRET_KEY: ${SPRING_CRYPTO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXP: ${JWT_ACCESS_EXP}
      JWT_REFRESH_EXP: ${JWT_REFRESH_EXP}
      CLOUD_AWS_S3_BUCKET: ${CLOUD_AWS_S3_BUCKET}
      CLOUD_AWS_CREDENTIALS_ACCESS_KEY: ${CLOUD_AWS_CREDENTIALS_ACCESS_KEY}
      CLOUD_AWS_CREDENTIALS_SECRET_KEY: ${CLOUD_AWS_CREDENTIALS_SECRET_KEY}
      NCP_ACCESS_KEY: ${NCP_ACCESS_KEY}
      NCP_SECRET_KEY: ${NCP_SECRET_KEY}
      NCP_SENDER_PHONE: ${NCP_SENDER_PHONE}
      NCP_SERVICE_ID: ${NCP_SERVICE_ID}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
    volumes:
      - app_prod_logs:/app/logs
    depends_on:
      mysql-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
    networks:
      - wilo-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Spring Boot Application - PRODUCTION (Green)
  app-prod-green:
    image: ${DOCKER_USERNAME}/wilo:prod-latest
    container_name: wilo-app-prod-green
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 768m
    ports:
      - "8091:8080"  # Green 포트 (외부 8091 -> 컨테이너 내부 8080)
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -XX:+ExitOnOutOfMemoryError"
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-prod:3306/wilo_db_prod?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis-prod
      SPRING_DATA_REDIS_PORT: 6379
      # 환경 변수
      AI_BASE_URL: ${AI_BASE_URL}
      SPRING_CRYPTO_SECRET_KEY: ${SPRING_CRYPTO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXP: ${JWT_ACCESS_EXP}
      JWT_REFRESH_EXP: ${JWT_REFRESH_EXP}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      CLOUD_AWS_S3_BUCKET: ${CLOUD_AWS_S3_BUCKET}
      CLOUD_AWS_CREDENTIALS_ACCESS_KEY: ${CLOUD_AWS_CREDENTIALS_ACCESS_KEY}
      CLOUD_AWS_CREDENTIALS_SECRET_KEY: ${CLOUD_AWS_CREDENTIALS_SECRET_KEY}
      NCP_ACCESS_KEY: ${NCP_ACCESS_KEY}
      NCP_SECRET_KEY: ${NCP_SECRET_KEY}
      NCP_SENDER_PHONE: ${NCP_SENDER_PHONE}
      NCP_SERVICE_ID: ${NCP_SERVICE_ID}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
    volumes:
      - app_prod_logs:/app/logs
    depends_on:
      mysql-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
    networks:
      - wilo-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - green  # 기본적으로는 비활성화, 배포 시에만 활성화

networks:
  wilo-network:
    driver: bridge

volumes:
  mysql_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  app_prod_logs:
    driver: local
