spring:
  site:
    url: http://localhost:8080

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:wilo_ci}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:wilo}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        show_sql: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  h2:
    console:
      enabled: false

  crypto:
    secret-key: ${CRYPTO_SECRET_KEY}

ai:
  base-url: http://localhost:8000

logging:
  level:
    root: warn

jwt:
  secret: ${JWT_SECRET:test-jwt-secret-minimum-32-bytes-required}
  access-exp: 1800000
  refresh-exp: 1209600000

cloud:
  aws:
    s3:
      bucket: ${CLOUD_AWS_S3_BUCKET:dummy-ci-bucket}
    region:
      static: ${CLOUD_AWS_REGION:ap-northeast-2}
    stack:
      auto: false
    credentials:
      access-key: ${CLOUD_AWS_CREDENTIALS_ACCESS_KEY:dummy}
      secret-key: ${CLOUD_AWS_CREDENTIALS_SECRET_KEY:dummy}

ncp:
  access-key: ${NCP_ACCESS_KEY}
  secret-key: ${NCP_SECRET_KEY}
  sender-phone: ${NCP_SENDER_PHONE}
  service-id: ${NCP_SERVICE_ID}

apple:
  client-id: ${APPLE_CLIENT_ID}
  team-id: ${APPLE_TEAM_ID}
  key-id: ${APPLE_KEY_ID}
  private-key: ${APPLE_PRIVATE_KEY}
